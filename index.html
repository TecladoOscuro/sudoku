<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1976d2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sudoku" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="stylesheet" href="css/styles.css" />

  <title>Sudoku</title>
</head>
<body>
  <div id="app"></div>

  <script src="js/sudoku/solver.js"></script>
  <script src="js/sudoku/hints.js"></script>
  <script src="js/sudoku/generator.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui/home.js"></script>
  <script src="js/ui/difficulty.js"></script>
  <script src="js/ui/keypad.js"></script>

  <script src="js/app.js"></script>
